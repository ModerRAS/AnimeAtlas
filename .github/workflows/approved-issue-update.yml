name: Approved Issue Update

on:
  issues:
    types:
      - labeled

permissions:
  actions: write
  contents: write
  issues: write

concurrency:
  group: approved-issue-update
  cancel-in-progress: false

jobs:
  update-from-approved-issue:
    name: Update From Approved Issues
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: List approved issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh issue list --state open --label approved --limit 1000 --json number,url,body,author,updatedAt > approved-issues.json

      - name: Sync approved contribution records
        run: pnpm --filter @animeatlas/github-action start -- sync-approved-issues "$GITHUB_WORKSPACE/approved-issues.json" --approved-by github-actions[bot] > approved-issue-sync.json

      - name: Apply approved contributions
        run: pnpm cli -- contributions apply-approved --write

      - name: Regenerate derived artifacts
        run: pnpm generate

      - name: Validate result
        run: pnpm check

      - name: Generate commit message
        id: commit-message
        run: |
          count=$(jq '.results | length' approved-issue-sync.json)
          issues=$(jq -r '[.results[].contribution.issue.number | "#\(.)"] | join(", ")' approved-issue-sync.json)
          if [[ "$count" == "1" ]]; then
            operation=$(jq -r '.results[0].contribution.operation.type' approved-issue-sync.json)
            media_id=$(jq -r '.results[0].contribution.operation.media_id // empty' approved-issue-sync.json)
            case "$operation" in
              add_alias) message="data: add alias to ${media_id} (${issues})" ;;
              add_provider_ref) message="data: add provider ref to ${media_id} (${issues})" ;;
              correct_metadata) message="data: correct metadata for ${media_id} (${issues})" ;;
              create_media) message="data: create media (${issues})" ;;
              *) message="data: apply approved contribution (${issues})" ;;
            esac
          else
            message="data: apply ${count} approved contributions (${issues})"
          fi
          echo "message=${message}" >> "$GITHUB_OUTPUT"

      - name: Commit approved contributions
        id: commit
        env:
          COMMIT_MESSAGE: ${{ steps.commit-message.outputs.message }}
        run: |
          git add source/contributions/approved db generated
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "$COMMIT_MESSAGE"
          git push origin HEAD:master
          echo "changed=true" >> "$GITHUB_OUTPUT"
          echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Close applied issues
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_SHA: ${{ steps.commit.outputs.sha }}
        run: |
          while read -r issue; do
            gh issue close "$issue" --comment "Applied in ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/commit/${COMMIT_SHA}."
          done < <(jq -r '.[].number' approved-issues.json)

      - name: Run release workflow
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run release.yml --ref master
